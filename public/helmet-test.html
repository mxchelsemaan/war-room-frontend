<!DOCTYPE html>
<html>
<body style="background:#111;display:flex;gap:32px;padding:32px;align-items:flex-end;flex-wrap:wrap">

<!-- Attempt: Spartan helmet facing right, plume up-left -->
<!-- viewBox 0 0 40 56 -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 56" width="80" height="112" fill="#7E2D6B">
  <!--
    Clockwise from plume tip:
    - Plume rises from top-left of dome, sweeps up, has a rounded top
    - Dome is the large round body
    - Face/nose protrudes right
    - Cheek guard hangs down-right
    - Neck guard flares down-left
  -->
  <path d="
    M 12 2
    C 15 0 17 2 16 6
    C 20 4 28 6 33 14
    C 38 20 38 28 35 34
    L 40 34
    L 40 39
    L 33 39
    C 30 44 25 50 18 53
    C 12 56 5 55 3 50
    C 1 45 2 38 3 30
    C 4 18 8 10 14 7
    C 12 5 11 3 12 2
    Z
  "/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 56" width="80" height="112" fill="#7E2D6B">
  <!-- variant 2: taller plume, more distinct nose guard -->
  <path d="
    M 14 0
    C 17 0 18 3 16 7
    C 22 5 30 8 34 16
    C 38 22 38 32 34 38
    L 40 38
    L 40 43
    L 32 43
    C 29 47 24 52 17 54
    C 11 56 4 54 2 49
    C 0 44 2 36 3 28
    C 5 16 10 8 16 6
    C 14 4 13 1 14 0
    Z
  "/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 56" width="80" height="112" fill="#7E2D6B">
  <!-- variant 3: separate plume shape -->
  <!-- dome + neck guard -->
  <path d="
    M 2 50
    C 0 44 2 36 4 28
    C 6 16 12 8 20 6
    C 28 4 36 10 38 20
    C 40 28 38 36 34 42
    C 30 48 22 54 14 54
    C 8 54 4 54 2 50

  "/>
  <!-- plume -->
  <path d="
    M 16 6
    C 14 2 15 0 18 0
    C 21 0 22 2 20 6
    Z
  "/>
  <!-- nose guard protrusion -->
  <path d="
    M 38 28
    L 44 30
    L 44 34
    L 38 34
    Z
  "/>
</svg>

</body>
</html>
